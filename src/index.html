<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' asset: http://asset.localhost https://asset.localhost; img-src 'self' asset: http://asset.localhost https://asset.localhost data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>חנות תוספים לאוצריא - אופליין</title>
  <link rel="icon" href="assets/logo.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-header__brand">
        <img src="assets/logo.svg" alt="אוצריא" class="app-header__logo" />
        <div>
          <div class="app-header__title">חנות תוספים לאוצריא</div>
          <div class="app-header__subtitle">גרסה אופליין למחשב</div>
        </div>
      </div>
      <div class="app-header__actions">
        <span id="last-sync-label" class="last-sync-label"></span>
        <button id="sync-btn" class="btn btn--primary">
          <span class="icon">⟳</span>
          <span>סנכרון מהאתר</span>
        </button>
      </div>
    </div>
  </header>

  <main id="app-root" class="app-root"></main>

  <footer class="app-footer">
    <div class="app-footer__inner">
      חנות התוספים האופליינית נטענת מתוך עותק מקומי במחשב זה. לחצו על &quot;סנכרון מהאתר&quot; כדי לעדכן מ־otzaria.org
    </div>
  </footer>

  <div id="sync-overlay" class="sync-overlay hidden">
    <div class="sync-modal">
      <div class="spinner"></div>
      <div id="sync-message" class="sync-message">מתחיל סנכרון...</div>
      <div class="progress-track">
        <div id="sync-progress-bar" class="progress-bar" style="width:0%"></div>
      </div>
      <div id="sync-warnings" class="sync-warnings"></div>
    </div>
  </div>

  <script src="tauri-bridge.js"></script>
  <script src="app.js"></script>
</body>
</html>
